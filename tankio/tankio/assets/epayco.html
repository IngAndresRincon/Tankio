
<!DOCTYPE html>

<html lang="en" xmlns="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8" />
    <title>Pagar con ePayco</title>
</head>
<body>
    <script src="https://code.jquery.com/jquery-2.1.4.min.js"></script>
    <script type="text/javascript" src="https://checkout.epayco.co/checkout-v2.js"></script>




    <script type="text/javascript">

        //var monto = parseInt(number);
        //var monto = "<%=this.Number%>";

        var handler = ePayco.checkout.configure({
            key: "[p_key]",
            test: true
        });

        var data = {
            //Parametros compra (obligatorio)
            name: "Producto InselectApp",
            description: "[station]",
            invoice: "[invoice]",
            currency: "[currency]",
            amount: "[amount]",
            //amount: "5000",
            tax_base: "0",
            tax: "0",
            country: "co",
            lang: "es",

            //Onpage="false" - Standard="true"
            external: "false",


            //Atributos opcionales
            extra1: "[invoice]",
            extra2: "[token]",
            extra3: "extra3",
            confirmation: "https://subdivinely-unreciprocal-hee.ngrok-free.dev/api/sandbox.tankio/v1/payment-gateway/webhook/epayco",
            response: "https://subdivinely-unreciprocal-hee.ngrok-free.dev/public/response.html",
            // confirmation: "http://192.168.0.7:82/ePayco/confirmation1.html",
            // response:     "http://192.168.2.7:40418/epayco/response.html",
            //response: "[respuesta]",

            //Atributos cliente
            name_billing: "[name_billing]",
            address_billing: "[address_billing]",
            type_doc_billing: "[type_doc_billing]",
            mobilephone_billing: "[mobilephone_billing]",
            number_doc_billing: "[number_doc_billing]",

         //atributo deshabilitaci n metodo de pago
          //methodsDisable: ["TDC", "PSE", "SP", "CASH", "DP"]

        };
        handler.open(data)
       
    </script>
</body>
</html>
